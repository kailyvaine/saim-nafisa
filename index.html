<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saim & Nafisa</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:80px;
font-size:50px;
letter-spacing:3px;
}

.section{
padding:80px 20px;
}

#counter{
font-size:24px;
margin-top:20px;
opacity:0.9;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
width:90%;
margin:auto;
padding-bottom:80px;
}

.photo-card{
position:relative;
}

.gallery img{
width:100%;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.quote{
position:absolute;
bottom:15px;
left:15px;
right:15px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
font-size:14px;
}
</style>

</head>

<body>

<div class="section">

<h1>Saim ❤️ Nafisa</h1>

<div id="counter"></div>

<button onclick="playMusic()">Play Our Song</button>

<audio id="music" loop>
<source src="music/music.mp3" type="audio/mpeg">
</audio>

</div>
<div class="gallery" id="gallery"></div>
<script>

const startDate = new Date("2023-09-07")

function updateCounter(){

const now = new Date()

const diff = now - startDate

const days = Math.floor(diff/(1000*60*60*24))

const hours = Math.floor(diff/(1000*60*60)) % 24

const minutes = Math.floor(diff/(1000*60)) % 60

document.getElementById("counter").innerHTML =
"We have been together for <b>" +
days + " days " +
hours + " hours " +
minutes + " minutes ❤️"

}

setInterval(updateCounter,1000)

updateCounter()

function playMusic(){

document.getElementById("music").play()

}
const quotes = [
"I love you, and that's the beginning and end of everything.",
"I'm not perfect, but I'm perfect for you.",
"There are darknesses in life, and there are lights, and you are one of the lights.",
"I can bear pain myself, but I couldn't bear yours.",
"Everything is better with you, Everything has been better since you.",
"Between seas, galaxies and moons, I was lucky to step on the same land as you.",
"And I will meet you where the sky ends. Where the eternity begins.",
"You return like autumn...and I fall all the time.",
"I find you in every song I listen to.",
"The moon in me finds the sky in you.",
"Damn, your eyes.",
"And in the middle of my chaos there was you.",
"I write, because you exist.",
"There was forever in those eyes.",
"Meet me where the falling stars live.",
"But there is never a day I stop loving you.",
"Between a dream and a dream.",
"For me there is only you."
];

let photos = []

for(let i=1;i<=85;i++){
photos.push("photos/photo"+i+".jpg")
}

photos.sort(()=>Math.random()-0.5)

quotes.sort(()=>Math.random()-0.5)

const gallery=document.getElementById("gallery")

photos.forEach((photo,i)=>{

const card=document.createElement("div")
card.className="photo-card"

const img=document.createElement("img")
img.src=photo

const quote=document.createElement("div")
quote.className="quote"
quote.innerText=quotes[i % quotes.length]

card.appendChild(img)
card.appendChild(quote)

gallery.appendChild(card)

})
</script>

</body>
</html>
