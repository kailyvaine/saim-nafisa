<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saim ❤️ Nafisa</title>
  <style>
      body{
            margin:0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
            color:white;
            text-align:center;
      }

      /* Hero Section */
      .hero{
            opacity:0;
            transform:translateY(20px);
            animation:fadeIn 2.5s ease forwards;
            margin-top:30px;
      }

      @keyframes fadeIn{
            to{
                    opacity:1;
                    transform:translateY(0);
            }
      }

      h1{
            font-size:52px;
            text-shadow:0 0 20px rgba(255,255,255,0.4);
      }

      .subtitle{
            font-size:20px;
            margin-top:-10px;
            margin-bottom:20px;
            color:#ddd;
            font-style:italic;
            letter-spacing:1px;
      }

      /* Gallery */
      .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            margin-top:20px;
      }

      .photo-container{
            position:relative;   /* THIS IS IMPORTANT */
            display:inline-block;
            margin:5px;
      }

      .photo-container img{
            width:220px;
            height:220px;
            object-fit:cover;
            border-radius:12px;
      }

      .quote{
            position:absolute;
            bottom:8px;
            left:8px;
            right:8px;
            color:white;
            font-size:14px;
            text-align:center;
            text-shadow:0 0 10px rgba(0,0,0,0.8);
            background:rgba(0,0,0,0.35);
            padding:6px 10px;
            border-radius:8px;
      }
    </style>
  </head>
  <body>

    <div class="hero">
        <h1>Saim ❤️ Nafisa</h1>
      <p class="subtitle">Our memories, scattered like stars.</p>p>
      <p id="counter"></p>p>
    </div>div>
  
  <div class="gallery" id="gallery"></div>div>
  
  <script>
      // ===== Relationship Counter =====
      const startDate = new Date("September 7, 2023 00:00:00");
      const counter = document.getElementById("counter");

      function updateCounter(){
            const now = new Date();
            let diff = now - startDate;

        const days = Math.floor(diff/(1000*60*60*24));
            diff -= days*(1000*60*60*24);

            const hours = Math.floor(diff/(1000*60*60));
            diff -= hours*(1000*60*60);

            const minutes = Math.floor(diff/(1000*60));
            diff -= minutes*(1000*60);

            counter.innerHTML = `We have been together for <b>${days} days ${hours} hours ${minutes} minutes</b> ❤️`;
      }
      setInterval(updateCounter,60000);
      updateCounter();

      // ===== Photos & Quotes =====
      const photos = [];
      const quotes = [
            "I love you, and that's the beginning and end of everything",
            "I'm not perfect, but I'm perfect for you",
            "There are darknesses in life, and there are lights, and you are one of the lights",
            "I can bear pain myself, but I couldn't bear yours",
            "Everything is better with you, everything has been better since you",
            "Between seas, galaxies and moons, I was lucky, I stepped on the same land, I dreamed under the same stars as you",
            "And I will meet you where the sky ends. Where eternity begins",
            "You return like autumn...and I fall all the time",
            "I find you in every song I listen to",
            "The moon in me finds the sky in you",
            "Damn, your eyes",
            "And in the middle of my chaos there was you",
            "I write, because you exist",
            "There was forever in those eyes",
            "Meet me where the falling stars live, I will wait for you day and night",
            "But there is never a day I stop loving you",
            "Between a dream and a dream",
            "For me there is only you"
            // Add more quotes if you want
          ];

      // Create photo paths
      const totalPhotos = 82; // change if you add more
      for(let i=1;i<=totalPhotos;i++){
            photos.push(`photos/photo${i}.jpg`);
      }

      // Shuffle photos and quotes
      function shuffle(array){
            for(let i=array.length-1;i>0;i--){
                    const j=Math.floor(Math.random()*(i+1));
                    [array[i],array[j]]=[array[j],array[i]];
            }
            return array;
      }

      const gallery = document.getElementById("gallery");
      const shuffledPhotos = shuffle([...photos]);
      const shuffledQuotes = shuffle([...quotes]);

      for(let i=0;i<shuffledPhotos.length;i++){
            const container = document.createElement("div");
            container.className="photo-container";

            const img = document.createElement("img");
            img.src = shuffledPhotos[i];

            const quote = document.createElement("div");
            quote.className="quote";
            quote.innerText = shuffledQuotes[i % shuffledQuotes.length]; // loop if fewer quotes

            container.appendChild(img);
            container.appendChild(quote);
            gallery.appendChild(container);
      }
  </script>
  </body>
</html>html>
  </script></h1>
  </body>
  </style></title>
  </head>
