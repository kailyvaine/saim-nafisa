<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saim & Nafisa</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:80px;
font-size:50px;
letter-spacing:3px;
}

.section{
padding:80px 20px;
}

#counter{
font-size:24px;
margin-top:20px;
opacity:0.9;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="section">

<h1>Saim ❤️ Nafisa</h1>

<div id="counter"></div>

<button onclick="playMusic()">Play Our Song</button>

<audio id="music" loop>
<source src="music/music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const startDate = new Date("2023-09-07")

function updateCounter(){

const now = new Date()

const diff = now - startDate

const days = Math.floor(diff/(1000*60*60*24))

const hours = Math.floor(diff/(1000*60*60)) % 24

const minutes = Math.floor(diff/(1000*60)) % 60

document.getElementById("counter").innerHTML =
"We have been together for <b>" +
days + " days " +
hours + " hours " +
minutes + " minutes ❤️"

}

setInterval(updateCounter,1000)

updateCounter()

function playMusic(){

document.getElementById("music").play()

}

</script>

</body>
</html>
